<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>康柏产品视频说明书</title>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"Noto Serif SC"', '"Source Han Serif SC"', '"STSong"', 'serif'],
              body: ['"Microsoft YaHei"', '"PingFang SC"', '"Noto Sans CJK SC"', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ink: #171914;
        --muted: #6a7168;
        --line: rgba(23, 25, 20, 0.12);
        --paper: #f7f8f4;
        --card: rgba(255, 255, 255, 0.86);
        --accent: #0f6b5c;
        --accent-strong: #bf4f37;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
        background:
          linear-gradient(135deg, rgba(15, 107, 92, 0.10), transparent 34%),
          linear-gradient(315deg, rgba(191, 79, 55, 0.10), transparent 28%),
          linear-gradient(180deg, #fbfcf8 0%, var(--paper) 100%);
      }

      button,
      video {
        font: inherit;
      }

      .site-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .brand-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        padding: 24px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand-lockup {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 16px;
      }

      .brand-logo {
        width: 64px;
        height: 64px;
        border-radius: 8px;
        box-shadow: 0 18px 38px rgba(15, 107, 92, 0.18);
      }

      .brand-kicker,
      .section-label,
      .product-type,
      .modal-eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: "Noto Serif SC", "Source Han Serif SC", "STSong", serif;
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin-top: 4px;
        font-size: clamp(1.65rem, 3.5vw, 2.9rem);
        line-height: 1.08;
      }

      .brand-note {
        color: var(--muted);
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .toolbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        padding: 44px 0 22px;
      }

      .toolbar h2 {
        margin-top: 8px;
        font-size: clamp(1.5rem, 2.6vw, 2.25rem);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill strong {
        color: var(--ink);
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
        padding-bottom: 64px;
      }

      .product-card {
        display: flex;
        min-height: 100%;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        box-shadow: 0 18px 54px rgba(23, 25, 20, 0.08);
      }

      .media-frame {
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background: #eef1ed;
      }

      .media-frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .product-copy {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 10px;
        padding: 18px;
      }

      .product-copy h3 {
        font-size: 1.16rem;
        line-height: 1.28;
      }

      .product-copy p:last-child {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.72;
      }

      .watch-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        min-height: 46px;
        margin: 0 18px 18px;
        border: 0;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .watch-button:hover {
        background: var(--accent);
        box-shadow: 0 14px 26px rgba(15, 107, 92, 0.20);
        transform: translateY(-1px);
      }

      .watch-button:focus-visible,
      .icon-button:focus-visible {
        outline: 3px solid rgba(191, 79, 55, 0.36);
        outline-offset: 3px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(12, 14, 11, 0.68);
        backdrop-filter: blur(16px);
      }

      .modal-overlay[hidden] {
        display: none;
      }

      .modal-panel {
        width: min(940px, 100%);
        max-height: min(760px, calc(100vh - 48px));
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: #fcfcf8;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.34);
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        padding: 22px 22px 18px;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h2 {
        margin-top: 6px;
        font-size: clamp(1.35rem, 3vw, 2rem);
      }

      .modal-head p:last-child {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .icon-button {
        display: inline-grid;
        width: 40px;
        height: 40px;
        flex: 0 0 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      .video-shell {
        position: relative;
        padding: 20px;
      }

      .video-shell video,
      .video-shell iframe {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 8px;
        background: #111;
        border: none;
      }

      @media (max-width: 980px) {
        .product-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .site-shell {
          width: min(100% - 24px, 1180px);
        }

        .brand-bar,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand-logo {
          width: 56px;
          height: 56px;
        }

        .brand-note {
          white-space: normal;
        }

        .product-grid {
          grid-template-columns: 1fr;
        }

        .modal-overlay {
          padding: 12px;
        }

        .modal-panel {
          max-height: calc(100vh - 24px);
        }

        .modal-head {
          padding: 18px;
        }

        .video-shell {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-shell">
      <div class="brand-bar">
        <div class="brand-lockup">
          <img
            class="brand-logo"
            alt="康柏 brand logo"
            src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 160'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%230f6b5c'/%3E%3Cstop offset='1' stop-color='%23bf4f37'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='160' height='160' rx='20' fill='%23171914'/%3E%3Ccircle cx='118' cy='42' r='24' fill='url(%23g)' opacity='.92'/%3E%3Cpath d='M39 116V42h22v30l31-30h28L84 78l38 38H93L61 84v32H39Z' fill='%23ffffff'/%3E%3C/svg%3E"
          />
          <div>
            <p class="brand-kicker">Kangbai Video Manual</p>
            <h1>康柏产品视频说明书</h1>
          </div>
        </div>
        <div class="brand-note">HTML5 / Tailwind CSS</div>
      </div>
    </header>

    <main class="site-shell">
      <section class="toolbar" aria-label="产品说明视频">
        <div>
          <p class="section-label">Product Library</p>
          <h2>产品说明视频</h2>
        </div>
        <div class="status-pill" aria-live="polite"><strong id="productCount">0</strong> 款产品</div>
      </section>

      <section id="productGrid" class="product-grid" aria-label="产品列表"></section>
    </main>

    <div id="videoModal" class="modal-overlay" hidden>
      <section
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        aria-describedby="modalDescription"
      >
        <div class="modal-head">
          <div>
            <p class="modal-eyebrow">Video Manual</p>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
          </div>
          <button id="closeModal" class="icon-button" type="button" aria-label="关闭视频">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="video-shell" id="videoShellContainer"></div>
      </section>
    </div>

    <script>
      const sampleVideo = "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4";

      const products = [
        {
          name: "K-Flow 智能净饮机",
          type: "Kitchen",
          description: "三步完成滤芯复位、温控设置与日常清洁。",
          colors: ["#e9f2ed", "#0f6b5c", "#bf4f37"],
          // 成功自动更新为您提供的真实B站视频BV号
          bilibiliId: "BV1jjJG6UEUr", 
        },
        {
          name: "AirFold 便携投影仪",
          type: "Vision",
          description: "快速掌握开机配对、梯形校正和墙面投放。",
          colors: ["#eef2f8", "#1f5f7a", "#c89f33"],
          video: sampleVideo,
        },
        {
          name: "NovaDock 多口扩展坞",
          type: "Desk",
          description: "说明电源、HDMI、网口与高速传输的连接顺序。",
          colors: ["#f2f4f1", "#4b5965", "#0f7d75"],
          video: sampleVideo,
        },
        {
          name: "PulseClean 无线洗地机",
          type: "Home",
          description: "覆盖水箱安装、自清洁流程和滚刷维护要点。",
          colors: ["#f1f5f2", "#264f38", "#d66b4b"],
          video: sampleVideo,
        },
      ];

      const grid = document.querySelector("#productGrid");
      const modal = document.querySelector("#videoModal");
      const closeModalButton = document.querySelector("#closeModal");
      const videoShellContainer = document.querySelector("#videoShellContainer");
      const modalTitle = document.querySelector("#modalTitle");
      const modalDescription = document.querySelector("#modalDescription");
      const productCount = document.querySelector("#productCount");
      let lastActiveElement = null;

      function svgDataUrl(svg) {
        return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
      }

      function buildProductImage(product) {
        const [base, primary, accent] = product.colors;

        return svgDataUrl(`
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="${base}"/>
                <stop offset="1" stop-color="#ffffff"/>
              </linearGradient>
              <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ffffff" stop-opacity=".92"/>
                <stop offset="1" stop-color="#ffffff" stop-opacity=".24"/>
              </linearGradient>
              <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#171914" flood-opacity=".18"/>
              </filter>
            </defs>
            <rect width="800" height="600" fill="url(#bg)"/>
            <circle cx="636" cy="130" r="92" fill="${accent}" opacity=".20"/>
            <circle cx="126" cy="494" r="126" fill="${primary}" opacity=".11"/>
            <g filter="url(#shadow)">
              <rect x="260" y="112" width="280" height="376" rx="44" fill="${primary}"/>
              <rect x="296" y="152" width="208" height="236" rx="28" fill="url(#shine)"/>
              <rect x="322" y="412" width="156" height="26" rx="13" fill="${accent}"/>
              <circle cx="400" cy="456" r="18" fill="#ffffff" opacity=".82"/>
            </g>
            <path d="M194 180h90M516 114h98M558 480h72" stroke="${accent}" stroke-width="16" stroke-linecap="round" opacity=".64"/>
            <text x="54" y="92" fill="#171914" font-size="34" font-family="Microsoft YaHei, sans-serif" font-weight="700">${product.type}</text>
          </svg>
        `);
      }

      function renderProducts() {
        productCount.textContent = products.length;
        grid.innerHTML = products
          .map((product, index) => {
            return `
              <article class="product-card">
                <div class="media-frame">
                  <img src="${buildProductImage(product)}" alt="${product.name} 产品图" loading="${index === 0 ? "eager" : "lazy"}" />
                </div>
                <div class="product-copy">
                  <p class="product-type">${product.type}</p>
                  <h3>${product.name}</h3>
                  <p>${product.description}</p>
                </div>
                <button class="watch-button" type="button" data-product-index="${index}" aria-label="观看 ${product.name} 说明视频">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5v14l11-7-11-7Z" fill="currentColor" />
                  </svg>
                  <span>观看说明视频</span>
                </button>
              </article>
            `;
          })
          .join("");
      }

      function openModal(product) {
        lastActiveElement = document.activeElement;
        modalTitle.textContent = product.name;
        modalDescription.textContent = product.description;

        if (product.bilibiliId) {
          videoShellContainer.innerHTML = `
            <iframe 
              src="https://player.bilibili.com/player.html?bvid=${product.bilibiliId}&page=1&high_quality=1&danmaku=0&autoplay=1" 
              scrolling="no" 
              border="0" 
              frameborder="no" 
              framespacing="0" 
              allowfullscreen="true">
            </iframe>
          `;
        } else {
          videoShellContainer.innerHTML = `
            <video id="manualVideo" controls playsinline preload="metadata" poster="${buildProductImage(product)}">
              <source src="${product.video}" type="video/mp4">
            </video>
          `;
          const video = document.getElementById("manualVideo");
          video.play().catch(() => {});
        }

        modal.hidden = false;
        closeModalButton.focus();
      }

      function closeModal() {
        videoShellContainer.innerHTML = ''; 
        modal.hidden = true;

        if (lastActiveElement) {
          lastActiveElement.focus();
        }
      }

      renderProducts();

      grid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-product-index]");
        if (!button) return;
        openModal(products[Number(button.dataset.productIndex)]);
      });

      closeModalButton.addEventListener("click", closeModal);

      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeModal();
        }
      });
    </script>
  </body>
</html>

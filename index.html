<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>成都电信工会夏季防暑慰问品使用说明</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              display: ['"SimHei"', '"Microsoft YaHei"', '"PingFang SC"', 'sans-serif'],
              body: ['"SimHei"', '"Microsoft YaHei"', '"PingFang SC"', 'sans-serif'],
            },
          },
        },
      };
    </script>
    <style>
      :root {
        --ink: #171914;
        --muted: #6a7168;
        --line: rgba(23, 25, 20, 0.12);
        --paper: #f7f8f4;
        --card: rgba(255, 255, 255, 0.86);
        --accent: #0f6b5c;
        --accent-strong: #bf4f37;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--ink);
        font-family: "SimHei", "Microsoft YaHei", "PingFang SC", sans-serif;
        /* 背景色及渐变修改 */
        background-color: #e0f6f4;
        background-image: 
          radial-gradient(circle at 15% 25%, rgba(255, 255, 255, 0.7) 0%, transparent 45%),
          radial-gradient(circle at 85% 75%, rgba(15, 107, 92, 0.08) 0%, transparent 50%);
      }

      button,
      iframe {
        font: inherit;
      }

      .site-shell {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .brand-bar {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 24px;
        padding: 24px 0 18px;
        border-bottom: 1px solid var(--line);
      }

      .brand-lockup {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: 16px;
      }

      .brand-logo {
        width: 86px;
        height: 74px;
        object-fit: contain;
      }

      .brand-kicker,
      .section-label,
      .product-type,
      .modal-eyebrow {
        margin: 0;
        color: var(--accent);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        font-family: "SimHei", "Microsoft YaHei", "PingFang SC", sans-serif;
        font-weight: 700;
        letter-spacing: 0;
      }

      h1 {
        margin-top: 4px;
        font-size: clamp(1.45rem, 3.2vw, 2.52rem);
        line-height: 1.18;
        /* 大标题颜色修改为浅绿色 */
        color: #2ea785; 
      }

      .toolbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        padding: 44px 0 22px;
      }

      .toolbar h2 {
        margin-top: 8px;
        font-size: clamp(1.5rem, 2.6vw, 2.25rem);
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status-pill strong {
        color: var(--ink);
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 18px;
        padding-bottom: 64px;
      }

      .product-card {
        display: flex;
        min-height: 100%;
        flex-direction: column;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--card);
        box-shadow: 0 18px 54px rgba(23, 25, 20, 0.08);
      }

      .media-frame {
        aspect-ratio: 4 / 3;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.76), rgba(219, 245, 239, 0.84)),
          #e8f7f2;
      }

      .media-frame img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .product-copy {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 10px;
        padding: 18px;
      }

      .product-copy h3 {
        font-size: 1.16rem;
        line-height: 1.28;
      }

      .product-copy p:last-child {
        margin: 0;
        color: var(--muted);
        font-size: 0.94rem;
        line-height: 1.72;
      }

      .watch-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 9px;
        min-height: 46px;
        margin: 0 18px 18px;
        border: 0;
        border-radius: 8px;
        background: var(--ink);
        color: #fff;
        cursor: pointer;
        font-weight: 700;
        transition:
          transform 160ms ease,
          background 160ms ease,
          box-shadow 160ms ease;
      }

      .watch-button:hover {
        background: var(--accent);
        box-shadow: 0 14px 26px rgba(15, 107, 92, 0.20);
        transform: translateY(-1px);
      }

      .watch-button:focus-visible,
      .icon-button:focus-visible {
        outline: 3px solid rgba(191, 79, 55, 0.36);
        outline-offset: 3px;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(12, 14, 11, 0.68);
        backdrop-filter: blur(16px);
      }

      .modal-overlay[hidden] {
        display: none;
      }

      .modal-panel {
        width: min(940px, 100%);
        max-height: min(760px, calc(100vh - 48px));
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: #fcfcf8;
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.34);
      }

      .modal-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        padding: 22px 22px 18px;
        border-bottom: 1px solid var(--line);
      }

      .modal-head h2 {
        margin-top: 6px;
        font-size: clamp(1.35rem, 3vw, 2rem);
      }

      .modal-head p:last-child {
        margin: 8px 0 0;
        color: var(--muted);
        line-height: 1.55;
      }

      .icon-button {
        display: inline-grid;
        width: 40px;
        height: 40px;
        flex: 0 0 40px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
      }

      .video-shell {
        position: relative;
        padding: 20px;
      }

      .video-shell iframe {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        border: 0;
        border-radius: 8px;
        background: #111;
      }

      .tribute-footer {
        padding: 12px 0 56px;
        color: var(--accent);
        font-size: clamp(1.35rem, 3vw, 2.25rem);
        font-weight: 700;
        text-align: center;
      }

      @media (max-width: 980px) {
        .product-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .site-shell {
          width: min(100% - 24px, 1180px);
        }

        .brand-bar,
        .toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand-logo {
          width: 76px;
          height: 66px;
        }

        .product-grid {
          grid-template-columns: 1fr;
        }

        .modal-overlay {
          padding: 12px;
        }

        .modal-panel {
          max-height: calc(100vh - 24px);
        }

        .modal-head {
          padding: 18px;
        }

        .video-shell {
          padding: 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-shell">
      <div class="brand-bar">
        <div class="brand-lockup">
          <img
            id="brandLogo"
            class="brand-logo"
            alt="成都电信工会 Logo"
            src="assets/logo-cutout.png"
          />
          <div>
            <p class="brand-kicker">Chengdu Telecom Union Summer Care</p>
            <h1>成都电信工会-夏季防暑慰问品 使用说明</h1>
          </div>
        </div>
      </div>
    </header>

    <main class="site-shell">
      <section class="toolbar" aria-label="产品说明视频">
        <div>
          <p class="section-label">Product Library</p>
          <h2>产品说明视频</h2>
        </div>
        <div class="status-pill" aria-live="polite"><strong id="productCount">0</strong> 款产品</div>
      </section>

      <section id="productGrid" class="product-grid" aria-label="产品列表"></section>
    </main>

    <footer class="site-shell">
      <p class="tribute-footer">致敬每一位坚守岗位的你</p>
    </footer>

    <div id="videoModal" class="modal-overlay" hidden>
      <section
        class="modal-panel"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modalTitle"
        aria-describedby="modalDescription"
      >
        <div class="modal-head">
          <div>
            <p class="modal-eyebrow">Video Manual</p>
            <h2 id="modalTitle"></h2>
            <p id="modalDescription"></p>
          </div>
          <button id="closeModal" class="icon-button" type="button" aria-label="关闭视频">
            <svg width="19" height="19" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 6l12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>
          </button>
        </div>
        <div class="video-shell">
          <iframe
            id="manualFrame"
            title="产品说明视频"
            allow="autoplay; fullscreen; picture-in-picture"
            allowfullscreen
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </section>
    </div>

    <script>
      const assetBase = window.location.pathname.includes("/src/") ? "../data/export/assets/" : "assets/";
      
      const products = [
        {
          name: "便携户外通勤背包",
          type: "背包收纳",
          description: "轻量耐磨，一拉即紧，折叠后便于收纳，适合户外通勤随身携带。",
          image: `${assetBase}commute-backpack.jpg`,
          videoUrl: "https://www.bilibili.com/video/BV1pxjV6DED1/?vd_source=b8209fbcb52a7a8d687fd556c95f30f3",
          embedUrl: "https://player.bilibili.com/player.html?bvid=BV1pxjV6DED1&page=1&high_quality=1&autoplay=1",
        },
        {
          name: "背包/行李箱专用挂扣",
          type: "出行挂扣",
          description: "长短松紧随心调节，金属按扣开合利落，加厚 PP 织带承重稳固。",
          image: `${assetBase}luggage-strap-hook.jpg`,
          videoUrl: "https://www.bilibili.com/video/BV1f9jG6kEPN/?vd_source=b8209fbcb52a7a8d687fd556c95f30f3",
          embedUrl: "https://player.bilibili.com/player.html?bvid=BV1f9jG6kEPN&page=1&high_quality=1&autoplay=1",
        },
        {
          name: "洛克卷卷杯",
          type: "便携饮杯",
          description: "可折叠设计，小巧轻便，食品级硅胶材质，适合冷饮与日常饮水。",
          image: `${assetBase}lock-collapsible-cup.jpg`,
          videoUrl: "https://www.bilibili.com/video/BV179jG6kEZt/?vd_source=b8209fbcb52a7a8d687fd556c95f30f3",
          embedUrl: "https://player.bilibili.com/player.html?bvid=BV179jG6kEZt&page=1&high_quality=1&autoplay=1",
        },
        {
          name: "柔性折叠支架",
          type: "桌面支撑",
          description: "灵活调节、轻巧便携，可作为手机、平板或笔记本的稳固支架。",
          image: `${assetBase}flexible-folding-stand.jpg`,
          videoUrl: "https://www.bilibili.com/video/BV1AxjV6DEWz/?vd_source=b8209fbcb52a7a8d687fd556c95f30f3",
          embedUrl: "https://player.bilibili.com/player.html?bvid=BV1AxjV6DEWz&page=1&high_quality=1&autoplay=1",
        },
        {
          name: "制冷高速手持风扇",
          type: "降温风扇",
          description: "强劲风力，90度折叠调节，手持与桌面一键切换，半导体制冷快速降温。",
          image: `${assetBase}handheld-cooling-fan.jpg`,
          videoUrl: "https://www.bilibili.com/video/BV1E9jG6kEjU/?vd_source=b8209fbcb52a7a8d687fd556c95f30f3",
          embedUrl: "https://player.bilibili.com/player.html?bvid=BV1E9jG6kEjU&page=1&high_quality=1&autoplay=1",
        },
      ];

      const grid = document.querySelector("#productGrid");
      const modal = document.querySelector("#videoModal");
      const closeModalButton = document.querySelector("#closeModal");
      const frame = document.querySelector("#manualFrame");
      const modalTitle = document.querySelector("#modalTitle");
      const modalDescription = document.querySelector("#modalDescription");
      const productCount = document.querySelector("#productCount");
      const brandLogo = document.querySelector("#brandLogo");
      let lastActiveElement = null;

      function renderProducts() {
        brandLogo.src = `${assetBase}logo-cutout.png`;
        productCount.textContent = products.length;
        grid.innerHTML = products
          .map((product, index) => {
            return `
              <article class="product-card">
                <div class="media-frame">
                  <img src="${product.image}" alt="${product.name} 产品图" loading="${index === 0 ? "eager" : "lazy"}" />
                </div>
                <div class="product-copy">
                  <p class="product-type">${product.type}</p>
                  <h3>${product.name}</h3>
                  <p>${product.description}</p>
                </div>
                <button class="watch-button" type="button" data-product-index="${index}" aria-label="观看 ${product.name} 说明视频">
                  <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M8 5v14l11-7-11-7Z" fill="currentColor" />
                  </svg>
                  <span>观看说明视频</span>
                </button>
              </article>
            `;
          })
          .join("");
      }

      function openModal(product) {
        lastActiveElement = document.activeElement;
        modalTitle.textContent = product.name;
        modalDescription.textContent = product.description;
        frame.title = `${product.name} 使用说明视频`;
        frame.src = product.embedUrl;
        modal.hidden = false;
        closeModalButton.focus();
      }

      function closeModal() {
        frame.removeAttribute("src");
        modal.hidden = true;

        if (lastActiveElement) {
          lastActiveElement.focus();
        }
      }

      renderProducts();

      grid.addEventListener("click", (event) => {
        const button = event.target.closest("[data-product-index]");
        if (!button) return;

        openModal(products[Number(button.dataset.productIndex)]);
      });

      closeModalButton.addEventListener("click", closeModal);

      modal.addEventListener("click", (event) => {
        if (event.target === modal) {
          closeModal();
        }
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && !modal.hidden) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
